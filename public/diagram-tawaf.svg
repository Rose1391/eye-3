<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 250" font-family="Outfit, sans-serif">
  <defs>
    <radialGradient id="floor" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#FBF6F2"/>
      <stop offset="0.7" stop-color="#F3E9DE"/>
      <stop offset="1" stop-color="#E8DAC8"/>
    </radialGradient>
    <linearGradient id="kaaba-front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A2622"/>
      <stop offset="1" stop-color="#0E0C0A"/>
    </linearGradient>
    <linearGradient id="kaaba-side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1A1714"/>
      <stop offset="1" stop-color="#050403"/>
    </linearGradient>
    <linearGradient id="kaaba-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3A342E"/>
      <stop offset="1" stop-color="#24201C"/>
    </linearGradient>
    <linearGradient id="gold-band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#B8912F"/>
      <stop offset="0.5" stop-color="#E4CB86"/>
      <stop offset="1" stop-color="#B8912F"/>
    </linearGradient>
    <radialGradient id="stone-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#A82838"/>
      <stop offset="1" stop-color="#6E1420"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#3A1A1A" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- courtyard floor ellipse -->
  <ellipse cx="160" cy="128" rx="128" ry="70" fill="url(#floor)"/>
  <ellipse cx="160" cy="128" rx="128" ry="70" fill="none" stroke="#D8C4A8" stroke-width="1" opacity="0.6"/>

  <!-- tawaf direction ring -->
  <ellipse cx="160" cy="128" rx="104" ry="56" fill="none" stroke="#C9A14A" stroke-width="2" stroke-dasharray="3 6" opacity="0.75"/>
  <!-- directional arrowheads (anticlockwise) -->
  <g fill="#C9A14A">
    <path d="M160 72 l7 5 l-7 4 z"/>
    <path d="M56 128 l5 -7 l4 7 z" transform="rotate(-8 60 128)"/>
    <path d="M160 184 l-7 -5 l7 -4 z"/>
    <path d="M264 128 l-5 7 l-4 -7 z" transform="rotate(-8 260 128)"/>
  </g>

  <!-- Ka'bah (isometric cube) -->
  <g filter="url(#soft)" transform="translate(160,120)">
    <!-- top face -->
    <polygon points="-34,-38 0,-52 34,-38 0,-24" fill="url(#kaaba-top)"/>
    <!-- front face -->
    <polygon points="-34,-38 0,-24 0,34 -34,20" fill="url(#kaaba-front)"/>
    <!-- side face -->
    <polygon points="0,-24 34,-38 34,20 0,34" fill="url(#kaaba-side)"/>
    <!-- gold band front -->
    <polygon points="-34,-8 0,6 0,16 -34,2" fill="url(#gold-band)" opacity="0.95"/>
    <!-- gold band side -->
    <polygon points="0,6 34,-8 34,2 0,16" fill="url(#gold-band)" opacity="0.8"/>
    <!-- door hint -->
    <polygon points="-20,2 -8,7 -8,26 -20,21" fill="#C9A14A" opacity="0.5"/>
  </g>

  <!-- Black Stone marker -->
  <circle cx="112" cy="150" r="7" fill="url(#stone-glow)" filter="url(#soft)"/>
  <text x="112" y="176" font-size="10" font-weight="700" fill="#8B1E2D" text-anchor="middle">Black Stone</text>
  <text x="112" y="188" font-size="8.5" fill="#8C857F" text-anchor="middle">start &amp; end</text>

  <!-- Yemeni Corner -->
  <circle cx="118" cy="92" r="5.5" fill="#C9A14A" filter="url(#soft)"/>
  <text x="70" y="74" font-size="10" font-weight="600" fill="#8C6A18" text-anchor="middle">Yemeni</text>
  <text x="70" y="86" font-size="10" font-weight="600" fill="#8C6A18" text-anchor="middle">Corner</text>

  <!-- Maqam Ibrahim -->
  <g transform="translate(236,116)">
    <rect x="-5" y="-6" width="10" height="12" rx="2" fill="url(#gold-band)" filter="url(#soft)"/>
    <circle cx="0" cy="-9" r="3" fill="#E4CB86"/>
  </g>
  <text x="256" y="112" font-size="9.5" font-weight="600" fill="#8C6A18">Maqam</text>
  <text x="256" y="124" font-size="9.5" font-weight="600" fill="#8C6A18">Ibrahim</text>

  <text x="160" y="238" font-size="10.5" fill="#8C857F" text-anchor="middle" font-weight="500">7 circuits &#183; anticlockwise</text>
</svg>
