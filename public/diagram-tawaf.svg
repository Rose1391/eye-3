<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" font-family="Outfit, sans-serif">
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C9A14A" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#C9A14A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="160" cy="118" r="96" fill="url(#glow)"/>

  <!-- circular tawaf path (anticlockwise arrows) -->
  <circle cx="160" cy="118" r="82" fill="none" stroke="#C9A14A" stroke-width="2" stroke-dasharray="4 5" opacity="0.8"/>

  <!-- direction arrows on the circle -->
  <g fill="#C9A14A">
    <path d="M160 30 l-6 -6 l0 12 z" transform="rotate(-90 160 118)"/>
    <path d="M160 30 l-6 -6 l0 12 z" transform="rotate(0 160 118)"/>
    <path d="M160 30 l-6 -6 l0 12 z" transform="rotate(90 160 118)"/>
    <path d="M160 30 l-6 -6 l0 12 z" transform="rotate(180 160 118)"/>
  </g>

  <!-- Ka'bah -->
  <g transform="translate(160,118)">
    <rect x="-30" y="-30" width="60" height="60" rx="3" fill="#1C1A18"/>
    <rect x="-30" y="-8" width="60" height="5" fill="#C9A14A"/>
    <rect x="-30" y="-30" width="60" height="60" rx="3" fill="none" stroke="#C9A14A" stroke-width="1.5"/>
  </g>

  <!-- Black Stone marker (start/end) -->
  <circle cx="120" cy="150" r="6" fill="#8B1E2D"/>
  <text x="112" y="176" font-size="10" font-weight="600" fill="#8B1E2D" text-anchor="middle">Black Stone</text>
  <text x="112" y="188" font-size="8.5" fill="#8C857F" text-anchor="middle">start &amp; end</text>

  <!-- Yemeni Corner -->
  <circle cx="120" cy="86" r="5" fill="#C9A14A"/>
  <text x="86" y="72" font-size="10" font-weight="600" fill="#8C6A18" text-anchor="middle">Yemeni</text>
  <text x="86" y="84" font-size="10" font-weight="600" fill="#8C6A18" text-anchor="middle">Corner</text>

  <!-- Maqam Ibrahim -->
  <circle cx="232" cy="118" r="4" fill="#C9A14A"/>
  <text x="248" y="115" font-size="9.5" font-weight="600" fill="#8C6A18">Maqam</text>
  <text x="248" y="127" font-size="9.5" font-weight="600" fill="#8C6A18">Ibrahim</text>

  <text x="160" y="232" font-size="10" fill="#8C857F" text-anchor="middle">7 circuits, anticlockwise</text>
</svg>
