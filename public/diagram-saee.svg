<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 170" font-family="Outfit, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF6F2"/>
      <stop offset="1" stop-color="#F3E9DE"/>
    </linearGradient>
    <linearGradient id="hillL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A82838"/>
      <stop offset="1" stop-color="#5A1420"/>
    </linearGradient>
    <linearGradient id="hillR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A82838"/>
      <stop offset="1" stop-color="#5A1420"/>
    </linearGradient>
    <linearGradient id="walk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E4CB86"/>
      <stop offset="0.5" stop-color="#C9A14A"/>
      <stop offset="1" stop-color="#A8842E"/>
    </linearGradient>
    <radialGradient id="light" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#3FD98A"/>
      <stop offset="1" stop-color="#12A05E"/>
    </radialGradient>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#3A1A1A" flood-opacity="0.25"/>
    </filter>
    <filter id="glowf" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="400" height="170" fill="url(#sky)" rx="8"/>

  <!-- walkway with perspective (wider at front) -->
  <polygon points="34,96 366,96 356,116 44,116" fill="url(#walk)" filter="url(#s2)"/>
  <!-- centre dashed line -->
  <line x1="60" y1="106" x2="340" y2="106" stroke="#8A6A22" stroke-width="1.4" stroke-dasharray="5 6" opacity="0.6"/>

  <!-- Safa hill (left, layered for depth) -->
  <g filter="url(#s2)">
    <path d="M14 100 Q30 44 58 100 Z" fill="url(#hillL)"/>
    <path d="M22 100 Q36 60 54 100 Z" fill="#7A1D2A" opacity="0.6"/>
    <ellipse cx="36" cy="52" rx="4" ry="4" fill="#E4CB86" opacity="0.5"/>
  </g>
  <!-- Marwah hill (right) -->
  <g filter="url(#s2)">
    <path d="M342 100 Q370 42 386 100 Z" fill="url(#hillR)"/>
    <path d="M348 100 Q366 62 380 100 Z" fill="#7A1D2A" opacity="0.6"/>
  </g>

  <!-- green lights (poles + glowing orbs) -->
  <g>
    <rect x="166.5" y="56" width="3" height="42" rx="1.5" fill="#0E6B3E"/>
    <circle cx="168" cy="52" r="8" fill="url(#light)" filter="url(#glowf)"/>
    <circle cx="165.5" cy="49.5" r="2.4" fill="#DFFFEC" opacity="0.85"/>
    <rect x="222.5" y="56" width="3" height="42" rx="1.5" fill="#0E6B3E"/>
    <circle cx="224" cy="52" r="8" fill="url(#light)" filter="url(#glowf)"/>
    <circle cx="221.5" cy="49.5" r="2.4" fill="#DFFFEC" opacity="0.85"/>
  </g>

  <!-- running figure between lights -->
  <g stroke="#5A1420" stroke-width="2.6" stroke-linecap="round" fill="none" transform="translate(190,66)">
    <circle cx="6" cy="2" r="3.4" fill="#5A1420" stroke="none"/>
    <path d="M6 6 L3 16"/>
    <path d="M4 10 L11 13"/>
    <path d="M4 10 L-2 12"/>
    <path d="M3 16 L-2 23"/>
    <path d="M3 16 L9 22"/>
  </g>

  <!-- labels -->
  <text x="36" y="128" font-size="14" font-weight="700" fill="#8B1E2D" text-anchor="middle">Safa</text>
  <text x="36" y="142" font-size="9.5" fill="#8C857F" text-anchor="middle">Start</text>
  <text x="364" y="128" font-size="14" font-weight="700" fill="#8B1E2D" text-anchor="middle">Marwah</text>
  <text x="364" y="142" font-size="9.5" fill="#8C857F" text-anchor="middle">Finish</text>
  <text x="196" y="34" font-size="10.5" font-weight="700" fill="#12A05E" text-anchor="middle">Green lights</text>
  <text x="196" y="156" font-size="9.5" fill="#8C857F" text-anchor="middle">men run between the lights</text>
</svg>
